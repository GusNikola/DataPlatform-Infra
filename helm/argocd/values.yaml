argo-cd:
  global:
    nodeSelector:
      role: core
    tolerations:
      - key: role
        value: core
        effect: NoSchedule
        operator: Equal

  dex:
    enabled: false

  notifications:
    enabled: false

  server:
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
      hostname: argocd.gusnikola.com
      tls: true
