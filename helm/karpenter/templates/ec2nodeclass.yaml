apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: spark-executor
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  role: {{ .Values.nodeRoleName }}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName }}
  securityGroupSelectorTerms:
    - tags:
        kubernetes.io/cluster/{{ .Values.clusterName }}: owned
  tags:
    Name: {{ .Values.clusterName }}-karpenter-spark-executor
    karpenter.sh/discovery: {{ .Values.clusterName }}
---
