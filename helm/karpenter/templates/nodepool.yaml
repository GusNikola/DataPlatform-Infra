apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: spark-executor
spec:
  template:
    metadata:
      labels:
        role: spark-executor
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: spark-executor
      taints:
        - key: role
          value: spark-executor
          effect: NoSchedule
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: {{ toJson .Values.sparkNodePool.capacityTypes }}
        - key: node.kubernetes.io/instance-type
          operator: In
          values: {{ toJson .Values.sparkNodePool.instanceTypes }}
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: topology.kubernetes.io/zone
          operator: In
          values: {{ toJson .Values.sparkNodePool.availabilityZones }}
  limits:
    cpu: {{ mul .Values.sparkNodePool.maxNodes 16 }}
    memory: {{ mul .Values.sparkNodePool.maxNodes 64 }}Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: {{ .Values.sparkNodePool.consolidateAfter }}
    budgets:
      - nodes: 10%
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: platform
spec:
  template:
    metadata:
      labels:
        role: platform
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: platform
      taints:
        - key: role
          value: platform
          effect: NoSchedule
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: {{ toJson .Values.platformNodePool.instanceTypes }}
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: topology.kubernetes.io/zone
          operator: In
          values: {{ toJson .Values.platformNodePool.availabilityZones }}
  limits:
    cpu: {{ mul .Values.platformNodePool.maxNodes 4 }}
    memory: {{ mul .Values.platformNodePool.maxNodes 16 }}Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: {{ .Values.platformNodePool.consolidateAfter }}
    budgets:
      - nodes: 100%
---
