airflow:
  executor: KubernetesExecutor

  nodeSelector:
    role: platform
  tolerations:
    - key: role
      value: platform
      effect: NoSchedule
      operator: Equal

  serviceAccount:
    create: false
    name: airflow

  workers:
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::866376946262:role/dataplatform-dev-airflow-irsa"

  ingress:
    web:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      hosts:
        - name: airflow.gusnikola.com
          tls:
            enabled: true
            secretName: airflow-tls

  postgresql:
    enabled: true
    image:
      tag: latest
    primary:
      nodeSelector:
        role: platform
      tolerations:
        - key: role
          value: platform
          effect: NoSchedule
          operator: Equal
      persistence:
        size: 5Gi
        storageClass: gp2
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

  scheduler:
    nodeSelector:
      role: platform
    tolerations:
      - key: role
        value: platform
        effect: NoSchedule
        operator: Equal
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::866376946262:role/dataplatform-dev-airflow-irsa"
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

  webserver:
    nodeSelector:
      role: core
    tolerations:
      - key: role
        value: core
        effect: NoSchedule
        operator: Equal
    startupProbe:
      failureThreshold: 30
      periodSeconds: 10
      timeoutSeconds: 20
    livenessProbe:
      initialDelaySeconds: 15
      timeoutSeconds: 30
      failureThreshold: 20
      periodSeconds: 10
    readinessProbe:
      initialDelaySeconds: 15
      timeoutSeconds: 30
      failureThreshold: 20
      periodSeconds: 10
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

  triggerer:
    nodeSelector:
      role: platform
    tolerations:
      - key: role
        value: platform
        effect: NoSchedule
        operator: Equal
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::866376946262:role/dataplatform-dev-airflow-irsa"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      storageClassName: gp2

  dags:
    gitSync:
      enabled: true
      repo: https://github.com/GusNikola/DataPlatform-Infra.git
      branch: main
      subPath: dags
      period: 60s
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi

  cleanup:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  statsd:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 256Mi

  logs:
    persistence:
      enabled: false

  config:
    core:
      load_examples: "False"
    webserver:
      worker_class: "gthread"
      workers: "2"
      threads: "4"
      web_server_worker_timeout: "120"
    logging:
      remote_logging: "True"
      remote_base_log_folder: "s3://dataplatform-dev-data-866376946262/airflow-logs/"
      remote_log_conn_id: "aws_default"
      encrypt_s3_logs: "False"
    kubernetes_executor:
      namespace: airflow
      delete_worker_pods: "True"
      delete_worker_pods_on_failure: "False"

  pools:
    spark_submissions:
      slots: 2
      description: "Limits concurrent Spark submissions to prevent spark-operator controller deadlock"

  extraEnv: |
    - name: AWS_DEFAULT_REGION
      value: eu-central-1
    - name: AIRFLOW_CONN_AWS_DEFAULT
      value: "aws:///?region_name=eu-central-1"
