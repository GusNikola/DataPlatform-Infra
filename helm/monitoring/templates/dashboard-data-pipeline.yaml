apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-data-pipeline
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    grafana_folder: DataPlatform
data:
  data-pipeline.json: |
    {
      "title": "Data Pipeline Health",
      "uid": "data-pipeline",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "graphTooltip": 1,
      "tags": ["dataplatform", "airflow", "logging"],
      "time": { "from": "now-24h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "interval",
            "type": "interval",
            "label": "Interval",
            "options": [
              {"value": "1m", "text": "1m"},
              {"value": "5m", "text": "5m"},
              {"value": "15m", "text": "15m"},
              {"value": "30m", "text": "30m"},
              {"value": "1h", "text": "1h"}
            ],
            "current": {"value": "5m", "text": "5m"},
            "query": "1m,5m,15m,30m,1h",
            "auto": false
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Airflow Scheduler Heartbeat",
          "description": "1 = healthy, 0 = scheduler down",
          "gridPos": {"x": 0, "y": 0, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "airflow_scheduler_heartbeat or vector(0)", "legendFormat": "Heartbeat"}],
          "options": {"colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "DAG Runs Succeeded (24h)",
          "gridPos": {"x": 6, "y": 0, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "increase(airflow_dag_run_duration_success_count[24h]) or vector(0)", "legendFormat": "Succeeded"}],
          "options": {"colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": null}]}}}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "DAG Runs Failed (24h)",
          "gridPos": {"x": 12, "y": 0, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "increase(airflow_dag_run_duration_failed_count[24h]) or vector(0)", "legendFormat": "Failed"}],
          "options": {"colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}}
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Log Ingestion Rate (records/s)",
          "gridPos": {"x": 18, "y": 0, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "sum(rate(fluentbit_input_records_total[$__rate_interval])) or vector(0)", "legendFormat": "records/s"}],
          "options": {"colorMode": "value", "graphMode": "area"},
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "blue", "value": null}]}}}
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Airflow Task Duration p50 / p95",
          "gridPos": {"x": 0, "y": 4, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum by (le) (rate(airflow_task_duration_bucket[$__rate_interval]))) or vector(0)", "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.95, sum by (le) (rate(airflow_task_duration_bucket[$__rate_interval]))) or vector(0)", "legendFormat": "p95"}
          ],
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"fillOpacity": 5, "lineWidth": 2}}}
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Log Ingestion Rate by Node",
          "gridPos": {"x": 12, "y": 4, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "rate(fluentbit_input_records_total[$__rate_interval]) or vector(0)", "legendFormat": "{{ "{{" }}node_name{{ "}}" }}"}
          ],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"fillOpacity": 5, "lineWidth": 2}}}
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Log Drop Rate (errors/drops)",
          "gridPos": {"x": 0, "y": 12, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(rate(fluentbit_output_dropped_records_total[$__rate_interval])) or vector(0)", "legendFormat": "Dropped"},
            {"expr": "sum(rate(fluentbit_output_retried_records_total[$__rate_interval])) or vector(0)", "legendFormat": "Retried"}
          ],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"fillOpacity": 10, "lineWidth": 2}, "color": {"mode": "palette-classic"}, "thresholds": {"steps": [{"color": "red", "value": 1}]}}}
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Airflow Running / Queued Tasks",
          "gridPos": {"x": 12, "y": 12, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "airflow_executor_running_tasks or vector(0)", "legendFormat": "Running"},
            {"expr": "airflow_executor_queued_tasks or vector(0)", "legendFormat": "Queued"}
          ],
          "fieldConfig": {"defaults": {"custom": {"fillOpacity": 10, "lineWidth": 2}}}
        }
      ]
    }
