apiVersion: v1
kind: ConfigMap
metadata:
  name: dataplatform-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  dataplatform-overview.json: |
    {
      "title": "DataPlatform Overview",
      "uid": "dataplatform-overview",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "graphTooltip": 1,
      "tags": ["dataplatform"],
      "time": { "from": "now-3h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "label": "Datasource",
            "hide": 0,
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1, "type": "row", "title": "Cluster",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "collapsed": false
        },
        {
          "id": 2, "type": "stat", "title": "Total Nodes",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none", "textMode": "auto" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "mappings": []
            }
          },
          "targets": [{ "expr": "count(kube_node_info)", "legendFormat": "", "refId": "A" }]
        },
        {
          "id": 3, "type": "stat", "title": "System Nodes",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] },
              "mappings": []
            }
          },
          "targets": [{ "expr": "count(kube_node_labels{label_role=\"system\"}) or vector(0)", "legendFormat": "", "refId": "A" }]
        },
        {
          "id": 4, "type": "stat", "title": "Karpenter SPOT Nodes",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 5 },
                { "color": "red", "value": 15 }
              ] },
              "mappings": []
            }
          },
          "targets": [{ "expr": "count(kube_node_labels{label_karpenter_sh_capacity_type=\"spot\"}) or vector(0)", "legendFormat": "", "refId": "A" }]
        },
        {
          "id": 5, "type": "gauge", "title": "Cluster CPU Used %",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "minVizWidth": 75, "minVizHeight": 75 },
          "fieldConfig": {
            "defaults": {
              "unit": "percent", "min": 0, "max": 100,
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 70 },
                { "color": "red", "value": 85 }
              ] },
              "mappings": []
            }
          },
          "targets": [{ "expr": "(1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))) * 100", "legendFormat": "", "refId": "A" }]
        },
        {
          "id": 6, "type": "gauge", "title": "Cluster Memory Used %",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "minVizWidth": 75, "minVizHeight": 75 },
          "fieldConfig": {
            "defaults": {
              "unit": "percent", "min": 0, "max": 100,
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 75 },
                { "color": "red", "value": 90 }
              ] },
              "mappings": []
            }
          },
          "targets": [{ "expr": "(1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes)) * 100", "legendFormat": "", "refId": "A" }]
        },
        {
          "id": 7, "type": "timeseries", "title": "CPU Usage by Node",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } },
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "min": 0, "max": 1, "custom": { "lineWidth": 2, "fillOpacity": 10 } }
          },
          "targets": [{
            "expr": "1 - rate(node_cpu_seconds_total{mode=\"idle\"}[5m])",
            "legendFormat": "{{ node }}",
            "refId": "A"
          }]
        },
        {
          "id": 8, "type": "timeseries", "title": "Memory Usage by Node",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } },
          "fieldConfig": {
            "defaults": { "unit": "bytes", "custom": { "lineWidth": 2, "fillOpacity": 10 } }
          },
          "targets": [{
            "expr": "node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes",
            "legendFormat": "{{ instance }}",
            "refId": "A"
          }]
        },
        {
          "id": 10, "type": "row", "title": "Spark",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 13 },
          "collapsed": false
        },
        {
          "id": 11, "type": "stat", "title": "Active Executor Pods",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 10 },
                { "color": "red", "value": 18 }
              ] },
              "mappings": []
            }
          },
          "targets": [{ "expr": "count(kube_pod_labels{namespace=\"spark\", label_spark_role=\"executor\"}) or vector(0)", "legendFormat": "", "refId": "A" }]
        },
        {
          "id": 12, "type": "stat", "title": "Spark Pods Succeeded (24h)",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "mappings": []
            }
          },
          "targets": [{ "expr": "count(kube_pod_status_phase{namespace=\"spark\", phase=\"Succeeded\"}) or vector(0)", "legendFormat": "", "refId": "A" }]
        },
        {
          "id": 13, "type": "timeseries", "title": "Spark Executor Pods Over Time",
          "gridPos": { "h": 4, "w": 12, "x": 12, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "options": { "tooltip": { "mode": "single" }, "legend": { "displayMode": "hidden" } },
          "fieldConfig": {
            "defaults": { "unit": "short", "min": 0, "custom": { "lineWidth": 2, "fillOpacity": 20, "drawStyle": "line" } }
          },
          "targets": [{ "expr": "count(kube_pod_labels{namespace=\"spark\", label_spark_role=\"executor\"}) or vector(0)", "legendFormat": "executors", "refId": "A" }]
        },
        {
          "id": 20, "type": "row", "title": "Airflow",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 },
          "collapsed": false
        },
        {
          "id": 21, "type": "stat", "title": "Airflow Running Pods",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 19 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "red", "value": null },
                { "color": "green", "value": 3 }
              ] },
              "mappings": []
            }
          },
          "targets": [{ "expr": "count(kube_pod_status_phase{namespace=\"airflow\", phase=\"Running\"}) or vector(0)", "legendFormat": "", "refId": "A" }]
        },
        {
          "id": 22, "type": "stat", "title": "Airflow Pod Restarts (24h)",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 19 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 3 },
                { "color": "red", "value": 10 }
              ] },
              "mappings": []
            }
          },
          "targets": [{ "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"airflow\"}[24h])) or vector(0)", "legendFormat": "", "refId": "A" }]
        },
        {
          "id": 23, "type": "timeseries", "title": "Airflow Pod Restarts Over Time",
          "gridPos": { "h": 4, "w": 12, "x": 12, "y": 19 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } },
          "fieldConfig": {
            "defaults": { "unit": "short", "min": 0, "custom": { "lineWidth": 2, "fillOpacity": 10, "drawStyle": "bars" } }
          },
          "targets": [{
            "expr": "increase(kube_pod_container_status_restarts_total{namespace=\"airflow\"}[1h])",
            "legendFormat": "{{ pod }} / {{ container }}",
            "refId": "A"
          }]
        },
        {
          "id": 30, "type": "row", "title": "Logging",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 },
          "collapsed": false
        },
        {
          "id": 31, "type": "timeseries", "title": "Log Ingestion Rate (records/s)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } },
          "fieldConfig": {
            "defaults": { "unit": "reqps", "min": 0, "custom": { "lineWidth": 2, "fillOpacity": 15 } }
          },
          "targets": [{
            "expr": "sum by (name) (rate(fluentbit_output_proc_records_total[5m]))",
            "legendFormat": "{{ name }}",
            "refId": "A"
          }]
        },
        {
          "id": 32, "type": "timeseries", "title": "Log Drop / Retry Rate",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } },
          "fieldConfig": {
            "defaults": { "unit": "reqps", "min": 0, "custom": { "lineWidth": 2, "fillOpacity": 15 } }
          },
          "targets": [
            { "expr": "sum by (name) (rate(fluentbit_output_dropped_records_total[5m]))", "legendFormat": "dropped: {{ name }}", "refId": "A" },
            { "expr": "sum by (name) (rate(fluentbit_output_retried_records_total[5m]))", "legendFormat": "retried: {{ name }}", "refId": "B" }
          ]
        }
      ]
    }
