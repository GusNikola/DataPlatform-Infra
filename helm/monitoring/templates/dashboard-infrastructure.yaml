apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-infrastructure
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    grafana_folder: DataPlatform
data:
  infrastructure.json: |
    {
      "title": "Infrastructure",
      "uid": "infrastructure",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "graphTooltip": 1,
      "tags": ["dataplatform", "infrastructure"],
      "time": { "from": "now-3h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "interval",
            "type": "interval",
            "label": "Interval",
            "options": [
              {"value": "1m", "text": "1m"},
              {"value": "5m", "text": "5m"},
              {"value": "15m", "text": "15m"},
              {"value": "30m", "text": "30m"},
              {"value": "1h", "text": "1h"}
            ],
            "current": {"value": "5m", "text": "5m"},
            "query": "1m,5m,15m,30m,1h",
            "auto": false
          },
          {
            "name": "node",
            "type": "query",
            "label": "Node",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": "label_values(node_cpu_seconds_total, instance)",
            "multi": true,
            "includeAll": true,
            "current": {"text": "All", "value": "$__all"}
          },
          {
            "name": "namespace",
            "type": "query",
            "label": "Namespace",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": "label_values(kube_pod_info, namespace)",
            "multi": true,
            "includeAll": true,
            "current": {"text": "All", "value": "$__all"}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "CPU Usage per Node",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum by (instance) (rate(node_cpu_seconds_total{mode!=\"idle\", instance=~\"$node\"}[$__rate_interval]))",
              "legendFormat": "{{ "{{" }}instance{{ "}}" }}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"fillOpacity": 10, "lineWidth": 2}}},
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "table", "placement": "right", "calcs": ["mean", "max"]}}
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Memory Usage per Node",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "node_memory_MemTotal_bytes{instance=~\"$node\"} - node_memory_MemAvailable_bytes{instance=~\"$node\"}",
              "legendFormat": "{{ "{{" }}instance{{ "}}" }}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "bytes", "custom": {"fillOpacity": 10, "lineWidth": 2}}},
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "table", "placement": "right", "calcs": ["mean", "max"]}}
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Disk Read/Write IOPS",
          "gridPos": {"x": 0, "y": 8, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum by (instance) (rate(node_disk_reads_completed_total{instance=~\"$node\"}[$__rate_interval]))", "legendFormat": "read {{ "{{" }}instance{{ "}}" }}"},
            {"expr": "sum by (instance) (rate(node_disk_writes_completed_total{instance=~\"$node\"}[$__rate_interval]))", "legendFormat": "write {{ "{{" }}instance{{ "}}" }}"}
          ],
          "fieldConfig": {"defaults": {"unit": "iops", "custom": {"fillOpacity": 5, "lineWidth": 2}}},
          "options": {"tooltip": {"mode": "multi"}}
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Network In/Out per Node",
          "gridPos": {"x": 12, "y": 8, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum by (instance) (rate(node_network_receive_bytes_total{instance=~\"$node\", device!~\"lo|docker.*|veth.*\"}[$__rate_interval]))", "legendFormat": "in {{ "{{" }}instance{{ "}}" }}"},
            {"expr": "sum by (instance) (rate(node_network_transmit_bytes_total{instance=~\"$node\", device!~\"lo|docker.*|veth.*\"}[$__rate_interval]))", "legendFormat": "out {{ "{{" }}instance{{ "}}" }}"}
          ],
          "fieldConfig": {"defaults": {"unit": "Bps", "custom": {"fillOpacity": 5, "lineWidth": 2}}},
          "options": {"tooltip": {"mode": "multi"}}
        },
        {
          "id": 5,
          "type": "bargauge",
          "title": "PVC Usage %",
          "description": "Persistent volume usage — Prometheus, Elasticsearch, Airflow Postgres",
          "gridPos": {"x": 0, "y": 16, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes * 100",
              "legendFormat": "{{ "{{" }}namespace{{ "}}" }}/{{ "{{" }}persistentvolumeclaim{{ "}}" }}"
            }
          ],
          "options": {"orientation": "horizontal", "displayMode": "gradient"},
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 85}]}}}
        },
        {
          "id": 6,
          "type": "bargauge",
          "title": "Pod Restarts by Namespace (last $interval)",
          "gridPos": {"x": 12, "y": 16, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum by (namespace) (increase(kube_pod_container_status_restarts_total{namespace=~\"$namespace\"}[$__rate_interval]))",
              "legendFormat": "{{ "{{" }}namespace{{ "}}" }}"
            }
          ],
          "options": {"orientation": "horizontal", "displayMode": "gradient"},
          "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}, {"color": "red", "value": 5}]}}}
        }
      ]
    }
