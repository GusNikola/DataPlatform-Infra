apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-spark-karpenter
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  spark-karpenter.json: |
    {
      "title": "Spark & Karpenter",
      "uid": "spark-karpenter",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "graphTooltip": 1,
      "tags": ["dataplatform", "spark", "karpenter"],
      "time": { "from": "now-7d", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "interval",
            "type": "interval",
            "label": "Interval",
            "options": [
              {"value": "1m", "text": "1m"},
              {"value": "5m", "text": "5m"},
              {"value": "15m", "text": "15m"},
              {"value": "30m", "text": "30m"},
              {"value": "1h", "text": "1h"}
            ],
            "current": {"value": "5m", "text": "5m"},
            "auto": false
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Active Spark Executor Pods",
          "gridPos": {"x": 0, "y": 0, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "count(kube_pod_info{namespace=\"spark\"}) or vector(0)", "legendFormat": "Executors"}],
          "options": {"colorMode": "background", "graphMode": "area", "textMode": "auto"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "blue", "value": null}]}}}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Spark Executor Nodes (Karpenter SPOT)",
          "gridPos": {"x": 6, "y": 0, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "count(kube_node_labels{label_role=\"spark-executor\"}) or vector(0)", "legendFormat": "SPOT Nodes"}],
          "options": {"colorMode": "background", "graphMode": "area"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": null}]}}}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Spark Jobs Succeeded (24h)",
          "gridPos": {"x": 12, "y": 0, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "count(kube_pod_status_phase{namespace=\"spark\", phase=\"Succeeded\"}) or vector(0)", "legendFormat": "Succeeded"}],
          "options": {"colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": null}]}}}
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Spark Jobs Failed (24h)",
          "gridPos": {"x": 18, "y": 0, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "count(kube_pod_status_phase{namespace=\"spark\", phase=\"Failed\"}) or vector(0)", "legendFormat": "Failed"}],
          "options": {"colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}}
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Node Count by Role — Karpenter Autoscaling (7d)",
          "description": "Core nodes are always-on. Platform and Spark nodes are provisioned on demand by Karpenter.",
          "gridPos": {"x": 0, "y": 4, "w": 24, "h": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "count by (label_role) (kube_node_labels)", "legendFormat": "{{label_role}}"}
          ],
          "options": {
            "tooltip": {"mode": "multi"},
            "legend": {"displayMode": "table", "placement": "right", "calcs": ["mean", "max", "lastNotNull"]}
          },
          "fieldConfig": {
            "defaults": {
              "custom": {"fillOpacity": 15, "lineWidth": 2, "spanNulls": false},
              "unit": "short"
            }
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Spark Executor Pod Count over Time",
          "gridPos": {"x": 0, "y": 13, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "count(kube_pod_status_phase{namespace=\"spark\", phase=\"Running\"}) or vector(0)", "legendFormat": "Running Executors"},
            {"expr": "count(kube_pod_status_phase{namespace=\"spark\", phase=\"Pending\"}) or vector(0)", "legendFormat": "Pending Executors"}
          ],
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "fieldConfig": {"defaults": {"custom": {"fillOpacity": 10, "lineWidth": 2}}}
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Karpenter Nodes Provisioned over Time",
          "gridPos": {"x": 12, "y": 13, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "karpenter_nodes_total or vector(0)", "legendFormat": "{{nodepool}}"}
          ],
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "fieldConfig": {"defaults": {"custom": {"fillOpacity": 10, "lineWidth": 2}}}
        }
      ]
    }
