kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      nodeSelector:
        role: platform
      tolerations:
        - key: role
          value: platform
          effect: NoSchedule
          operator: Equal
      retention: 7d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp2
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi

  grafana:
    enabled: true
    fullnameOverride: grafana
    nodeSelector:
      role: platform
    tolerations:
      - key: role
        value: platform
        effect: NoSchedule
        operator: Equal
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    grafana.ini:
      auth.anonymous:
        enabled: true
        org_name: Main Org.
        org_role: Viewer
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      hosts:
        - grafana.gusnikola.com
      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.gusnikola.com
    additionalDataSources:
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.tracing.svc.cluster.local:3100
        isDefault: false
        jsonData:
          httpMethod: GET
          serviceMap:
            datasourceUid: prometheus
      - name: Elasticsearch
        type: elasticsearch
        access: proxy
        url: http://elasticsearch-master.logging.svc.cluster.local:9200
        isDefault: false
        jsonData:
          index: fluentbit-*
          timeField: "@timestamp"
          esVersion: "7.10.0"
          logMessageField: log
          logLevelField: level

  alertmanager:
    alertmanagerSpec:
      nodeSelector:
        role: platform
      tolerations:
        - key: role
          value: platform
          effect: NoSchedule
          operator: Equal
    config:
      global:
        smtp_smarthost: "smtp.gmail.com:587"
        smtp_from: "alertmanager@gusnikola.com"
        smtp_auth_username: ""   # fill in
        smtp_auth_password: ""   # fill in
        smtp_require_tls: true
      route:
        group_by: ["alertname", "namespace"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: email
      receivers:
        - name: email
          email_configs:
            - to: ngusic@europecloudatlas.com
              send_resolved: true

  prometheusOperator:
    nodeSelector:
      role: platform
    tolerations:
      - key: role
        value: platform
        effect: NoSchedule
        operator: Equal

  kube-state-metrics:
    nodeSelector:
      role: platform
    tolerations:
      - key: role
        value: platform
        effect: NoSchedule
        operator: Equal

  # node-exporter runs on ALL nodes (core, platform, spark-executor)
  prometheus-node-exporter:
    tolerations:
      - key: role
        value: core
        effect: NoSchedule
        operator: Equal
      - key: role
        value: platform
        effect: NoSchedule
        operator: Equal
      - key: role
        value: spark-executor
        effect: NoSchedule
        operator: Equal
