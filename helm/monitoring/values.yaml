kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      nodeSelector:
        role: system
      retention: 7d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp2
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi

  grafana:
    enabled: true
    fullnameOverride: grafana
    nodeSelector:
      role: system
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      hosts:
        - grafana.gusnikola.com
      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.gusnikola.com

  alertmanager:
    alertmanagerSpec:
      nodeSelector:
        role: system
    config:
      global:
        smtp_smarthost: "smtp.gmail.com:587"
        smtp_from: "alertmanager@gusnikola.com"
        smtp_auth_username: ""   # fill in
        smtp_auth_password: ""   # fill in
        smtp_require_tls: true
      route:
        group_by: ["alertname", "namespace"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: email
      receivers:
        - name: email
          email_configs:
            - to: ngusic@europecloudatlas.com
              send_resolved: true

  kube-state-metrics:
    nodeSelector:
      role: system

  # node-exporter runs on ALL nodes including spark-executor (tainted)
  prometheus-node-exporter:
    tolerations:
      - key: role
        value: spark-executor
        effect: NoSchedule
        operator: Equal
