apiVersion: batch/v1
kind: Job
metadata:
  name: kibana-setup
  namespace: logging
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      volumes:
        - name: setup-script
          configMap:
            name: kibana-setup-script
            defaultMode: 0755
      containers:
        - name: setup
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              apk add --no-cache curl > /dev/null 2>&1
              /scripts/setup.sh
          volumeMounts:
            - name: setup-script
              mountPath: /scripts
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
