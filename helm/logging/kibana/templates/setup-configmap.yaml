apiVersion: v1
kind: ConfigMap
metadata:
  name: kibana-setup-script
  namespace: logging
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
data:
  setup.sh: |
    #!/bin/sh
    set -e
    KIBANA="http://kibana-kibana.logging.svc.cluster.local:5601"

    echo "Waiting for Kibana..."
    until curl -sf "$KIBANA/api/status" 2>/dev/null | grep -qE '"level":"available"|"state":"green"'; do
      sleep 5
    done
    echo "Kibana ready."

    # ── Index pattern ──────────────────────────────────────────────────────────
    curl -sf -X POST "$KIBANA/api/saved_objects/index-pattern/fluentbit?overwrite=true" \
      -H "kbn-xsrf: true" -H "Content-Type: application/json" \
      -d '{
        "attributes": {
          "title": "fluentbit-*",
          "timeFieldName": "@timestamp",
          "fields": "[]",
          "fieldFormatMap": "{\"level\":{\"id\":\"color\",\"params\":{\"fieldType\":\"string\",\"colors\":[{\"range\":\"ERROR\",\"regex\":\"ERROR\",\"text\":\"#ffffff\",\"background\":\"#E02020\"},{\"range\":\"WARN\",\"regex\":\"WARN\",\"text\":\"#ffffff\",\"background\":\"#F5A623\"},{\"range\":\"INFO\",\"regex\":\"INFO\",\"text\":\"#ffffff\",\"background\":\"#417505\"},{\"range\":\"DEBUG\",\"regex\":\"DEBUG\",\"text\":\"#ffffff\",\"background\":\"#7B68EE\"}]}}}"
        }
      }' > /dev/null
    echo "Index pattern created."

    # ── Saved search: Spark Job Logs ───────────────────────────────────────────
    curl -sf -X POST "$KIBANA/api/saved_objects/search/spark-job-logs?overwrite=true" \
      -H "kbn-xsrf: true" -H "Content-Type: application/json" \
      -d '{
        "attributes": {
          "title": "Spark Job Logs",
          "description": "All logs from Spark driver and executor pods",
          "columns": ["kubernetes.namespace_name","kubernetes.pod_name","kubernetes.labels.spark-role","level","log"],
          "sort": [["@timestamp","desc"]],
          "version": 1,
          "kibanaSavedObjectMeta": {
            "searchSourceJSON": "{\"highlightAll\":true,\"version\":true,\"query\":{\"query\":\"kubernetes.namespace_name: spark\",\"language\":\"kuery\"},\"filter\":[],\"indexRefName\":\"kibanaSavedObjectMeta.searchSourceJSON.index\"}"
          }
        },
        "references": [{"name":"kibanaSavedObjectMeta.searchSourceJSON.index","type":"index-pattern","id":"fluentbit"}]
      }' > /dev/null
    echo "Saved search: Spark Job Logs created."

    # ── Saved search: Spark Errors ─────────────────────────────────────────────
    curl -sf -X POST "$KIBANA/api/saved_objects/search/spark-errors?overwrite=true" \
      -H "kbn-xsrf: true" -H "Content-Type: application/json" \
      -d '{
        "attributes": {
          "title": "Spark Errors",
          "description": "ERROR and WARN logs from Spark pods",
          "columns": ["kubernetes.pod_name","kubernetes.labels.spark-role","level","log"],
          "sort": [["@timestamp","desc"]],
          "version": 1,
          "kibanaSavedObjectMeta": {
            "searchSourceJSON": "{\"highlightAll\":true,\"version\":true,\"query\":{\"query\":\"kubernetes.namespace_name: spark AND (level: ERROR or level: WARN)\",\"language\":\"kuery\"},\"filter\":[],\"indexRefName\":\"kibanaSavedObjectMeta.searchSourceJSON.index\"}"
          }
        },
        "references": [{"name":"kibanaSavedObjectMeta.searchSourceJSON.index","type":"index-pattern","id":"fluentbit"}]
      }' > /dev/null
    echo "Saved search: Spark Errors created."

    # ── Saved search: Airflow Task Logs ───────────────────────────────────────
    curl -sf -X POST "$KIBANA/api/saved_objects/search/airflow-task-logs?overwrite=true" \
      -H "kbn-xsrf: true" -H "Content-Type: application/json" \
      -d '{
        "attributes": {
          "title": "Airflow Task Logs",
          "description": "Logs from Airflow scheduler, webserver and task pods",
          "columns": ["kubernetes.pod_name","kubernetes.container_name","level","log"],
          "sort": [["@timestamp","desc"]],
          "version": 1,
          "kibanaSavedObjectMeta": {
            "searchSourceJSON": "{\"highlightAll\":true,\"version\":true,\"query\":{\"query\":\"kubernetes.namespace_name: airflow\",\"language\":\"kuery\"},\"filter\":[],\"indexRefName\":\"kibanaSavedObjectMeta.searchSourceJSON.index\"}"
          }
        },
        "references": [{"name":"kibanaSavedObjectMeta.searchSourceJSON.index","type":"index-pattern","id":"fluentbit"}]
      }' > /dev/null
    echo "Saved search: Airflow Task Logs created."

    # ── Saved search: Airflow Errors ──────────────────────────────────────────
    curl -sf -X POST "$KIBANA/api/saved_objects/search/airflow-errors?overwrite=true" \
      -H "kbn-xsrf: true" -H "Content-Type: application/json" \
      -d '{
        "attributes": {
          "title": "Airflow Errors",
          "description": "ERROR and WARN logs from Airflow pods",
          "columns": ["kubernetes.pod_name","kubernetes.container_name","level","log"],
          "sort": [["@timestamp","desc"]],
          "version": 1,
          "kibanaSavedObjectMeta": {
            "searchSourceJSON": "{\"highlightAll\":true,\"version\":true,\"query\":{\"query\":\"kubernetes.namespace_name: airflow AND (level: ERROR or level: WARN)\",\"language\":\"kuery\"},\"filter\":[],\"indexRefName\":\"kibanaSavedObjectMeta.searchSourceJSON.index\"}"
          }
        },
        "references": [{"name":"kibanaSavedObjectMeta.searchSourceJSON.index","type":"index-pattern","id":"fluentbit"}]
      }' > /dev/null
    echo "Saved search: Airflow Errors created."

    # ── Saved search: Platform Errors ─────────────────────────────────────────
    curl -sf -X POST "$KIBANA/api/saved_objects/search/platform-errors?overwrite=true" \
      -H "kbn-xsrf: true" -H "Content-Type: application/json" \
      -d '{
        "attributes": {
          "title": "Platform Errors and Warnings",
          "description": "ERROR and WARN level logs across all namespaces",
          "columns": ["kubernetes.namespace_name","kubernetes.pod_name","level","log"],
          "sort": [["@timestamp","desc"]],
          "version": 1,
          "kibanaSavedObjectMeta": {
            "searchSourceJSON": "{\"highlightAll\":true,\"version\":true,\"query\":{\"query\":\"level: ERROR or level: WARN\",\"language\":\"kuery\"},\"filter\":[],\"indexRefName\":\"kibanaSavedObjectMeta.searchSourceJSON.index\"}"
          }
        },
        "references": [{"name":"kibanaSavedObjectMeta.searchSourceJSON.index","type":"index-pattern","id":"fluentbit"}]
      }' > /dev/null
    echo "Saved search: Platform Errors created."

    # ── Saved search: All Errors Last Hour ───────────────────────────────────
    curl -sf -X POST "$KIBANA/api/saved_objects/search/all-errors-last-hour?overwrite=true" \
      -H "kbn-xsrf: true" -H "Content-Type: application/json" \
      -d '{
        "attributes": {
          "title": "All Errors Last Hour",
          "description": "All ERROR level logs across the platform in the last hour",
          "columns": ["kubernetes.namespace_name","kubernetes.pod_name","level","log"],
          "sort": [["@timestamp","desc"]],
          "version": 1,
          "kibanaSavedObjectMeta": {
            "searchSourceJSON": "{\"highlightAll\":true,\"version\":true,\"query\":{\"query\":\"level: ERROR\",\"language\":\"kuery\"},\"filter\":[],\"indexRefName\":\"kibanaSavedObjectMeta.searchSourceJSON.index\"}"
          }
        },
        "references": [{"name":"kibanaSavedObjectMeta.searchSourceJSON.index","type":"index-pattern","id":"fluentbit"}]
      }' > /dev/null
    echo "Saved search: All Errors Last Hour created."

    # ── Saved search: ArgoCD Sync Events ─────────────────────────────────────
    curl -sf -X POST "$KIBANA/api/saved_objects/search/argocd-sync-events?overwrite=true" \
      -H "kbn-xsrf: true" -H "Content-Type: application/json" \
      -d '{
        "attributes": {
          "title": "ArgoCD Sync Events",
          "description": "Sync and deployment activity from ArgoCD",
          "columns": ["kubernetes.pod_name","kubernetes.container_name","level","log"],
          "sort": [["@timestamp","desc"]],
          "version": 1,
          "kibanaSavedObjectMeta": {
            "searchSourceJSON": "{\"highlightAll\":true,\"version\":true,\"query\":{\"query\":\"kubernetes.namespace_name: argocd\",\"language\":\"kuery\"},\"filter\":[],\"indexRefName\":\"kibanaSavedObjectMeta.searchSourceJSON.index\"}"
          }
        },
        "references": [{"name":"kibanaSavedObjectMeta.searchSourceJSON.index","type":"index-pattern","id":"fluentbit"}]
      }' > /dev/null
    echo "Saved search: ArgoCD Sync Events created."

    # ── Saved search: Monitoring Stack Logs ──────────────────────────────────
    curl -sf -X POST "$KIBANA/api/saved_objects/search/monitoring-stack-logs?overwrite=true" \
      -H "kbn-xsrf: true" -H "Content-Type: application/json" \
      -d '{
        "attributes": {
          "title": "Monitoring Stack Logs",
          "description": "Logs from Prometheus, Grafana, AlertManager, and Tempo",
          "columns": ["kubernetes.pod_name","kubernetes.container_name","level","log"],
          "sort": [["@timestamp","desc"]],
          "version": 1,
          "kibanaSavedObjectMeta": {
            "searchSourceJSON": "{\"highlightAll\":true,\"version\":true,\"query\":{\"query\":\"kubernetes.namespace_name: monitoring\",\"language\":\"kuery\"},\"filter\":[],\"indexRefName\":\"kibanaSavedObjectMeta.searchSourceJSON.index\"}"
          }
        },
        "references": [{"name":"kibanaSavedObjectMeta.searchSourceJSON.index","type":"index-pattern","id":"fluentbit"}]
      }' > /dev/null
    echo "Saved search: Monitoring Stack Logs created."

    # ── Set default index pattern ─────────────────────────────────────────────
    curl -sf -X POST "$KIBANA/api/kibana/settings" \
      -H "kbn-xsrf: true" -H "Content-Type: application/json" \
      -d '{"changes":{"defaultIndex":"fluentbit"}}' > /dev/null
    echo "Default index pattern set."

    # ── Dashboard: Platform Log Overview ─────────────────────────────────────
    curl -sf -X POST "$KIBANA/api/saved_objects/dashboard/platform-log-overview?overwrite=true" \
      -H "kbn-xsrf: true" -H "Content-Type: application/json" \
      -d '{
        "attributes": {
          "title": "Platform Log Overview",
          "description": "Log volume, error rates, and level distribution across the entire platform",
          "panelsJSON": "[{\"embeddableConfig\":{\"title\":\"Log Volume by Namespace\",\"vis\":{\"type\":\"histogram\"}},\"gridData\":{\"x\":0,\"y\":0,\"w\":24,\"h\":10,\"i\":\"1\"},\"id\":\"log-volume-by-namespace\",\"panelIndex\":\"1\",\"type\":\"visualization\",\"version\":\"7.17.3\"},{\"embeddableConfig\":{\"title\":\"Log Level Distribution\",\"vis\":{\"type\":\"pie\"}},\"gridData\":{\"x\":0,\"y\":10,\"w\":12,\"h\":10,\"i\":\"2\"},\"id\":\"log-level-pie\",\"panelIndex\":\"2\",\"type\":\"visualization\",\"version\":\"7.17.3\"},{\"embeddableConfig\":{\"title\":\"Top Error Pods\",\"vis\":{\"type\":\"data_table\"}},\"gridData\":{\"x\":12,\"y\":10,\"w\":12,\"h\":10,\"i\":\"3\"},\"id\":\"top-error-pods\",\"panelIndex\":\"3\",\"type\":\"visualization\",\"version\":\"7.17.3\"}]",
          "timeRestore": false,
          "kibanaSavedObjectMeta": {
            "searchSourceJSON": "{\"query\":{\"query\":\"\",\"language\":\"kuery\"},\"filter\":[]}"
          }
        }
      }' > /dev/null || echo "Dashboard platform-log-overview: skipped (requires visualizations)"

    # ── Visualization: Log Volume by Namespace ────────────────────────────────
    curl -sf -X POST "$KIBANA/api/saved_objects/visualization/log-volume-by-namespace?overwrite=true" \
      -H "kbn-xsrf: true" -H "Content-Type: application/json" \
      -d '{
        "attributes": {
          "title": "Log Volume by Namespace",
          "visState": "{\"title\":\"Log Volume by Namespace\",\"type\":\"histogram\",\"aggs\":[{\"id\":\"1\",\"enabled\":true,\"type\":\"count\",\"schema\":\"metric\",\"params\":{}},{\"id\":\"2\",\"enabled\":true,\"type\":\"date_histogram\",\"schema\":\"segment\",\"params\":{\"field\":\"@timestamp\",\"useNormalizedEsInterval\":true,\"interval\":\"auto\",\"drop_partials\":false,\"min_doc_count\":1,\"extended_bounds\":{}}},{\"id\":\"3\",\"enabled\":true,\"type\":\"terms\",\"schema\":\"group\",\"params\":{\"field\":\"kubernetes.namespace_name\",\"orderBy\":\"1\",\"order\":\"desc\",\"size\":10,\"otherBucket\":false,\"otherBucketLabel\":\"Other\",\"missingBucket\":false,\"missingBucketLabel\":\"Missing\"}}],\"params\":{\"type\":\"histogram\",\"grid\":{\"categoryLines\":false},\"categoryAxes\":[{\"id\":\"CategoryAxis-1\",\"type\":\"category\",\"position\":\"bottom\",\"show\":true,\"style\":{},\"scale\":{\"type\":\"linear\"},\"labels\":{\"show\":true,\"filter\":true,\"truncate\":100},\"title\":{}}],\"valueAxes\":[{\"id\":\"ValueAxis-1\",\"name\":\"LeftAxis-1\",\"type\":\"value\",\"position\":\"left\",\"show\":true,\"style\":{},\"scale\":{\"type\":\"linear\",\"mode\":\"normal\"},\"labels\":{\"show\":true,\"rotate\":0,\"filter\":false,\"truncate\":100},\"title\":{\"text\":\"Count\"}}],\"seriesParams\":[{\"show\":true,\"type\":\"histogram\",\"mode\":\"stacked\",\"data\":{\"label\":\"Count\",\"id\":\"1\"},\"valueAxis\":\"ValueAxis-1\",\"drawLinesBetweenPoints\":true,\"lineWidth\":2,\"interpolate\":\"linear\",\"showCircles\":true}],\"addTooltip\":true,\"addLegend\":true,\"legendPosition\":\"right\",\"times\":[],\"addTimeMarker\":false,\"labels\":{\"show\":false},\"thresholdLine\":{\"show\":false,\"value\":10,\"width\":1,\"style\":\"full\",\"color\":\"#E7664C\"}}}",
          "uiStateJSON": "{}",
          "description": "",
          "kibanaSavedObjectMeta": {
            "searchSourceJSON": "{\"query\":{\"query\":\"\",\"language\":\"kuery\"},\"filter\":[],\"indexRefName\":\"kibanaSavedObjectMeta.searchSourceJSON.index\"}"
          }
        },
        "references": [{"name":"kibanaSavedObjectMeta.searchSourceJSON.index","type":"index-pattern","id":"fluentbit"}]
      }' > /dev/null
    echo "Visualization: Log Volume by Namespace created."

    # ── Visualization: Log Level Distribution (Pie) ───────────────────────────
    curl -sf -X POST "$KIBANA/api/saved_objects/visualization/log-level-pie?overwrite=true" \
      -H "kbn-xsrf: true" -H "Content-Type: application/json" \
      -d '{
        "attributes": {
          "title": "Log Level Distribution",
          "visState": "{\"title\":\"Log Level Distribution\",\"type\":\"pie\",\"aggs\":[{\"id\":\"1\",\"enabled\":true,\"type\":\"count\",\"schema\":\"metric\",\"params\":{}},{\"id\":\"2\",\"enabled\":true,\"type\":\"terms\",\"schema\":\"segment\",\"params\":{\"field\":\"level\",\"orderBy\":\"1\",\"order\":\"desc\",\"size\":10,\"otherBucket\":false,\"otherBucketLabel\":\"Other\",\"missingBucket\":false,\"missingBucketLabel\":\"Missing\"}}],\"params\":{\"type\":\"pie\",\"addTooltip\":true,\"addLegend\":true,\"legendPosition\":\"right\",\"isDonut\":true,\"labels\":{\"show\":true,\"values\":true,\"last_level\":true,\"truncate\":100}}}",
          "uiStateJSON": "{}",
          "description": "",
          "kibanaSavedObjectMeta": {
            "searchSourceJSON": "{\"query\":{\"query\":\"\",\"language\":\"kuery\"},\"filter\":[{\"meta\":{\"negate\":true,\"type\":\"exists\",\"key\":\"level\",\"disabled\":false},\"exists\":{\"field\":\"level\"},\"$state\":{\"store\":\"appState\"}}],\"indexRefName\":\"kibanaSavedObjectMeta.searchSourceJSON.index\"}"
          }
        },
        "references": [{"name":"kibanaSavedObjectMeta.searchSourceJSON.index","type":"index-pattern","id":"fluentbit"}]
      }' > /dev/null
    echo "Visualization: Log Level Distribution created."

    # ── Visualization: Top Error Pods ─────────────────────────────────────────
    curl -sf -X POST "$KIBANA/api/saved_objects/visualization/top-error-pods?overwrite=true" \
      -H "kbn-xsrf: true" -H "Content-Type: application/json" \
      -d '{
        "attributes": {
          "title": "Top Error Pods",
          "visState": "{\"title\":\"Top Error Pods\",\"type\":\"table\",\"aggs\":[{\"id\":\"1\",\"enabled\":true,\"type\":\"count\",\"schema\":\"metric\",\"params\":{}},{\"id\":\"2\",\"enabled\":true,\"type\":\"terms\",\"schema\":\"bucket\",\"params\":{\"field\":\"kubernetes.namespace_name\",\"orderBy\":\"1\",\"order\":\"desc\",\"size\":5,\"otherBucket\":false,\"otherBucketLabel\":\"Other\",\"missingBucket\":false,\"missingBucketLabel\":\"Missing\"}},{\"id\":\"3\",\"enabled\":true,\"type\":\"terms\",\"schema\":\"bucket\",\"params\":{\"field\":\"kubernetes.pod_name\",\"orderBy\":\"1\",\"order\":\"desc\",\"size\":10,\"otherBucket\":false,\"otherBucketLabel\":\"Other\",\"missingBucket\":false,\"missingBucketLabel\":\"Missing\"}}],\"params\":{\"perPage\":10,\"showPartialRows\":false,\"showMetricsAtAllLevels\":false,\"sort\":{\"columnIndex\":null,\"direction\":null},\"showTotal\":false,\"totalFunc\":\"sum\",\"percentageCol\":\"\"}}",
          "uiStateJSON": "{\"vis\":{\"params\":{\"sort\":{\"columnIndex\":null,\"direction\":null}}}}",
          "description": "",
          "kibanaSavedObjectMeta": {
            "searchSourceJSON": "{\"query\":{\"query\":\"level: ERROR\",\"language\":\"kuery\"},\"filter\":[],\"indexRefName\":\"kibanaSavedObjectMeta.searchSourceJSON.index\"}"
          }
        },
        "references": [{"name":"kibanaSavedObjectMeta.searchSourceJSON.index","type":"index-pattern","id":"fluentbit"}]
      }' > /dev/null
    echo "Visualization: Top Error Pods created."

    # ── Visualization: Spark Log Level Breakdown ──────────────────────────────
    curl -sf -X POST "$KIBANA/api/saved_objects/visualization/spark-log-level-breakdown?overwrite=true" \
      -H "kbn-xsrf: true" -H "Content-Type: application/json" \
      -d '{
        "attributes": {
          "title": "Spark Log Level Breakdown",
          "visState": "{\"title\":\"Spark Log Level Breakdown\",\"type\":\"histogram\",\"aggs\":[{\"id\":\"1\",\"enabled\":true,\"type\":\"count\",\"schema\":\"metric\",\"params\":{}},{\"id\":\"2\",\"enabled\":true,\"type\":\"date_histogram\",\"schema\":\"segment\",\"params\":{\"field\":\"@timestamp\",\"useNormalizedEsInterval\":true,\"interval\":\"auto\",\"drop_partials\":false,\"min_doc_count\":1,\"extended_bounds\":{}}},{\"id\":\"3\",\"enabled\":true,\"type\":\"terms\",\"schema\":\"group\",\"params\":{\"field\":\"level\",\"orderBy\":\"1\",\"order\":\"desc\",\"size\":10,\"otherBucket\":false,\"otherBucketLabel\":\"Other\",\"missingBucket\":false,\"missingBucketLabel\":\"Missing\"}}],\"params\":{\"type\":\"histogram\",\"grid\":{\"categoryLines\":false},\"categoryAxes\":[{\"id\":\"CategoryAxis-1\",\"type\":\"category\",\"position\":\"bottom\",\"show\":true,\"style\":{},\"scale\":{\"type\":\"linear\"},\"labels\":{\"show\":true,\"filter\":true,\"truncate\":100},\"title\":{}}],\"valueAxes\":[{\"id\":\"ValueAxis-1\",\"name\":\"LeftAxis-1\",\"type\":\"value\",\"position\":\"left\",\"show\":true,\"style\":{},\"scale\":{\"type\":\"linear\",\"mode\":\"normal\"},\"labels\":{\"show\":true,\"rotate\":0,\"filter\":false,\"truncate\":100},\"title\":{\"text\":\"Count\"}}],\"seriesParams\":[{\"show\":true,\"type\":\"histogram\",\"mode\":\"stacked\",\"data\":{\"label\":\"Count\",\"id\":\"1\"},\"valueAxis\":\"ValueAxis-1\",\"drawLinesBetweenPoints\":true,\"lineWidth\":2,\"interpolate\":\"linear\",\"showCircles\":true}],\"addTooltip\":true,\"addLegend\":true,\"legendPosition\":\"right\",\"times\":[],\"addTimeMarker\":false,\"labels\":{\"show\":false},\"thresholdLine\":{\"show\":false,\"value\":10,\"width\":1,\"style\":\"full\",\"color\":\"#E7664C\"}}}",
          "uiStateJSON": "{}",
          "description": "",
          "kibanaSavedObjectMeta": {
            "searchSourceJSON": "{\"query\":{\"query\":\"kubernetes.namespace_name: spark\",\"language\":\"kuery\"},\"filter\":[],\"indexRefName\":\"kibanaSavedObjectMeta.searchSourceJSON.index\"}"
          }
        },
        "references": [{"name":"kibanaSavedObjectMeta.searchSourceJSON.index","type":"index-pattern","id":"fluentbit"}]
      }' > /dev/null
    echo "Visualization: Spark Log Level Breakdown created."

    # ── Visualization: Airflow Log Volume by Component ────────────────────────
    curl -sf -X POST "$KIBANA/api/saved_objects/visualization/airflow-log-volume?overwrite=true" \
      -H "kbn-xsrf: true" -H "Content-Type: application/json" \
      -d '{
        "attributes": {
          "title": "Airflow Log Volume by Component",
          "visState": "{\"title\":\"Airflow Log Volume by Component\",\"type\":\"histogram\",\"aggs\":[{\"id\":\"1\",\"enabled\":true,\"type\":\"count\",\"schema\":\"metric\",\"params\":{}},{\"id\":\"2\",\"enabled\":true,\"type\":\"date_histogram\",\"schema\":\"segment\",\"params\":{\"field\":\"@timestamp\",\"useNormalizedEsInterval\":true,\"interval\":\"auto\",\"drop_partials\":false,\"min_doc_count\":1,\"extended_bounds\":{}}},{\"id\":\"3\",\"enabled\":true,\"type\":\"terms\",\"schema\":\"group\",\"params\":{\"field\":\"kubernetes.container_name\",\"orderBy\":\"1\",\"order\":\"desc\",\"size\":10,\"otherBucket\":false,\"otherBucketLabel\":\"Other\",\"missingBucket\":false,\"missingBucketLabel\":\"Missing\"}}],\"params\":{\"type\":\"histogram\",\"grid\":{\"categoryLines\":false},\"categoryAxes\":[{\"id\":\"CategoryAxis-1\",\"type\":\"category\",\"position\":\"bottom\",\"show\":true,\"style\":{},\"scale\":{\"type\":\"linear\"},\"labels\":{\"show\":true,\"filter\":true,\"truncate\":100},\"title\":{}}],\"valueAxes\":[{\"id\":\"ValueAxis-1\",\"name\":\"LeftAxis-1\",\"type\":\"value\",\"position\":\"left\",\"show\":true,\"style\":{},\"scale\":{\"type\":\"linear\",\"mode\":\"normal\"},\"labels\":{\"show\":true,\"rotate\":0,\"filter\":false,\"truncate\":100},\"title\":{\"text\":\"Count\"}}],\"seriesParams\":[{\"show\":true,\"type\":\"histogram\",\"mode\":\"stacked\",\"data\":{\"label\":\"Count\",\"id\":\"1\"},\"valueAxis\":\"ValueAxis-1\",\"drawLinesBetweenPoints\":true,\"lineWidth\":2,\"interpolate\":\"linear\",\"showCircles\":true}],\"addTooltip\":true,\"addLegend\":true,\"legendPosition\":\"right\",\"times\":[],\"addTimeMarker\":false,\"labels\":{\"show\":false},\"thresholdLine\":{\"show\":false,\"value\":10,\"width\":1,\"style\":\"full\",\"color\":\"#E7664C\"}}}",
          "uiStateJSON": "{}",
          "description": "",
          "kibanaSavedObjectMeta": {
            "searchSourceJSON": "{\"query\":{\"query\":\"kubernetes.namespace_name: airflow\",\"language\":\"kuery\"},\"filter\":[],\"indexRefName\":\"kibanaSavedObjectMeta.searchSourceJSON.index\"}"
          }
        },
        "references": [{"name":"kibanaSavedObjectMeta.searchSourceJSON.index","type":"index-pattern","id":"fluentbit"}]
      }' > /dev/null
    echo "Visualization: Airflow Log Volume by Component created."

    # ── Dashboard: Platform Log Overview ─────────────────────────────────────
    curl -sf -X POST "$KIBANA/api/saved_objects/dashboard/platform-log-overview?overwrite=true" \
      -H "kbn-xsrf: true" -H "Content-Type: application/json" \
      -d '{
        "attributes": {
          "title": "Platform Log Overview",
          "description": "Log volume, error rates, and level distribution across the entire platform",
          "panelsJSON": "[{\"embeddableConfig\":{},\"gridData\":{\"x\":0,\"y\":0,\"w\":24,\"h\":10,\"i\":\"1\"},\"id\":\"log-volume-by-namespace\",\"panelIndex\":\"1\",\"type\":\"visualization\",\"version\":\"7.17.3\"},{\"embeddableConfig\":{},\"gridData\":{\"x\":0,\"y\":10,\"w\":12,\"h\":10,\"i\":\"2\"},\"id\":\"log-level-pie\",\"panelIndex\":\"2\",\"type\":\"visualization\",\"version\":\"7.17.3\"},{\"embeddableConfig\":{},\"gridData\":{\"x\":12,\"y\":10,\"w\":12,\"h\":10,\"i\":\"3\"},\"id\":\"top-error-pods\",\"panelIndex\":\"3\",\"type\":\"visualization\",\"version\":\"7.17.3\"}]",
          "timeRestore": true,
          "timeTo": "now",
          "timeFrom": "now-6h",
          "refreshInterval": {"pause": false, "value": 30000},
          "kibanaSavedObjectMeta": {
            "searchSourceJSON": "{\"query\":{\"query\":\"\",\"language\":\"kuery\"},\"filter\":[]}"
          }
        },
        "references": [
          {"name":"1:panel_1","type":"visualization","id":"log-volume-by-namespace"},
          {"name":"2:panel_2","type":"visualization","id":"log-level-pie"},
          {"name":"3:panel_3","type":"visualization","id":"top-error-pods"}
        ]
      }' > /dev/null
    echo "Dashboard: Platform Log Overview created."

    # ── Dashboard: Spark Job Explorer ────────────────────────────────────────
    curl -sf -X POST "$KIBANA/api/saved_objects/dashboard/spark-job-explorer?overwrite=true" \
      -H "kbn-xsrf: true" -H "Content-Type: application/json" \
      -d '{
        "attributes": {
          "title": "Spark Job Explorer",
          "description": "Drill into Spark job logs — driver, executors, errors, and job timeline",
