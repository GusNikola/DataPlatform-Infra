fluentbit:
  # DaemonSet runs on ALL nodes (core, platform, spark-executor)
  tolerations:
    - key: role
      operator: Equal
      value: core
      effect: NoSchedule
    - key: role
      operator: Equal
      value: platform
      effect: NoSchedule
    - key: role
      operator: Equal
      value: spark-executor
      effect: NoSchedule

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  config:
    service: |
      [SERVICE]
          Flush         5
          Daemon        Off
          Log_Level     info
          HTTP_Server   On
          HTTP_Listen   0.0.0.0
          HTTP_Port     2020
          storage.path  /var/log/fluentbit-buffers
          storage.sync  normal
          storage.checksum off
          storage.backlog.mem_limit 5MB

    inputs: |
      [INPUT]
          Name              tail
          Path              /var/log/containers/*.log
          multiline.parser  docker, cri
          Tag               kube.*
          Mem_Buf_Limit     5MB
          Skip_Long_Lines   On
          storage.type      filesystem

    filters: |
      [FILTER]
          Name                kubernetes
          Match               kube.*
          Kube_URL            https://kubernetes.default.svc:443
          Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
          Kube_Tag_Prefix     kube.var.log.containers.
          Merge_Log           On
          Keep_Log            Off
          K8S-Logging.Parser  On
          K8S-Logging.Exclude Off

      [FILTER]
          Name   lua
          Match  kube.*
          script /fluent-bit/scripts/extract_level.lua
          call   extract_log_level

    outputs: |
      [OUTPUT]
          Name                  es
          Match                 kube.*
          Host                  elasticsearch-master.logging.svc.cluster.local
          Port                  9200
          Index                 fluentbit-%Y.%m.%d
          Type                  _doc
          Replace_Dots          On
          Retry_Limit           False
          tls                   Off
          tls.verify            Off
          Suppress_Type_Name    On

  luaScripts:
    extract_level.lua: |
      function extract_log_level(tag, timestamp, record)
        -- already has a level field (e.g. from JSON merge)
        if record["level"] ~= nil and record["level"] ~= "" then
          local l = string.upper(tostring(record["level"]))
          if l == "WARNING"  then l = "WARN"  end
          if l == "FATAL"    then l = "ERROR" end
          if l == "CRITICAL" then l = "ERROR" end
          record["level"] = l
          return 1, timestamp, record
        end

        local log = record["log"] or ""

        -- Spark / Java:  "26/04/08 04:35:05 INFO ClassName: msg"
        local level = string.match(log, "^%d+/%d+/%d+%s+%d+:%d+:%d+%s+(%u+)%s")

        -- Airflow / Python:  "[2026-04-08 ...] {file.py:123} INFO - msg"
        if not level then
          level = string.match(log, "%{[^}]+:[^}]+%}%s+(%u+)%s*[-:]")
        end

        -- Generic word-boundary scan (longest match first to avoid INFO inside WARNING)
        if not level then
          for _, l in ipairs({"CRITICAL","FATAL","ERROR","WARNING","WARN","INFO","DEBUG","TRACE"}) do
            if string.find(log, "%f[%a]" .. l .. "%f[%A]") then
              level = l
              break
            end
          end
        end

        if level then
          if level == "WARNING"  then level = "WARN"  end
          if level == "FATAL"    then level = "ERROR" end
          if level == "CRITICAL" then level = "ERROR" end
          record["level"] = level
          return 1, timestamp, record
        end

        return 0, timestamp, record
      end

  extraVolumes:
    - name: buffer
      hostPath:
        path: /var/log/fluentbit-buffers
        type: DirectoryOrCreate

  extraVolumeMounts:
    - name: buffer
      mountPath: /var/log/fluentbit-buffers
