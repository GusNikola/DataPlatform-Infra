fluentbit:
  # DaemonSet runs on ALL nodes including spark-executor (tainted)
  tolerations:
    - key: role
      operator: Equal
      value: spark-executor
      effect: NoSchedule

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  config:
    service: |
      [SERVICE]
          Flush         5
          Daemon        Off
          Log_Level     info
          storage.path  /var/log/fluentbit-buffers
          storage.sync  normal
          storage.checksum off
          storage.backlog.mem_limit 5MB

    inputs: |
      [INPUT]
          Name              tail
          Path              /var/log/containers/*.log
          multiline.parser  docker, cri
          Tag               kube.*
          Mem_Buf_Limit     5MB
          Skip_Long_Lines   On
          storage.type      filesystem

    filters: |
      [FILTER]
          Name                kubernetes
          Match               kube.*
          Kube_URL            https://kubernetes.default.svc:443
          Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
          Kube_Tag_Prefix     kube.var.log.containers.
          Merge_Log           On
          Keep_Log            Off
          K8S-Logging.Parser  On
          K8S-Logging.Exclude Off

    outputs: |
      [OUTPUT]
          Name                  es
          Match                 kube.*
          Host                  elasticsearch-master.logging.svc.cluster.local
          Port                  9200
          Index                 fluentbit-%Y.%m.%d
          Type                  _doc
          Replace_Dots          On
          Retry_Limit           False
          tls                   Off
          tls.verify            Off
          Suppress_Type_Name    On

  extraVolumes:
    - name: buffer
      hostPath:
        path: /var/log/fluentbit-buffers
        type: DirectoryOrCreate

  extraVolumeMounts:
    - name: buffer
      mountPath: /var/log/fluentbit-buffers
